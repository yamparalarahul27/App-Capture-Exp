<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; base-uri 'none'; form-action 'none'">
    <title>App Capture</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="setup-panel">
        <header class="brand-row">
          <div class="brand-mark">AC</div>
          <div>
            <h1>App Capture</h1>
            <p id="systemSummary">Checking Android tools</p>
          </div>
        </header>

        <section class="panel-section">
          <div class="section-title">
            <span>Android</span>
            <button class="icon-button" id="refreshStatusButton" title="Refresh status" aria-label="Refresh status">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-9 9 8.8 8.8 0 0 1-6.3-2.6M3 12a9 9 0 0 1 9-9 8.8 8.8 0 0 1 6.3 2.6M18 3v5h-5M6 21v-5h5"/></svg>
            </button>
          </div>
          <div class="status-grid" id="statusGrid"></div>
        </section>

        <section class="panel-section">
          <label class="field-label" for="apkPath">APK</label>
          <div class="file-row">
            <input id="apkPath" readonly placeholder="No APK selected">
            <button id="selectApkButton">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
              Browse
            </button>
          </div>
        </section>

        <section class="panel-section">
          <label class="field-label" for="avdSelect">AVD</label>
          <div class="field-row">
            <select id="avdSelect"></select>
            <button id="startAvdButton">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 3 14 9-14 9V3z"/></svg>
              Start
            </button>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-title">
            <label class="field-label" for="deviceSelect">Device</label>
            <button class="icon-button" id="refreshDevicesButton" title="Refresh devices" aria-label="Refresh devices">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-9 9 8.8 8.8 0 0 1-6.3-2.6M3 12a9 9 0 0 1 9-9 8.8 8.8 0 0 1 6.3 2.6M18 3v5h-5M6 21v-5h5"/></svg>
            </button>
          </div>
          <select id="deviceSelect"></select>
        </section>

        <section class="panel-section">
          <label class="field-label" for="packageName">Package</label>
          <input id="packageName" placeholder="Detected after install">
        </section>

        <section class="panel-section action-stack">
          <button id="installButton" class="primary-button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
            Install APK
          </button>
          <button id="launchButton">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 3 14 9-14 9V3z"/></svg>
            Launch
          </button>
        </section>
      </aside>

      <main class="capture-stage">
        <div class="stage-toolbar">
          <div>
            <h2>Screen</h2>
            <span id="captureMeta">No capture yet</span>
          </div>
          <div class="toolbar-actions">
            <button id="liveButton" title="Toggle live preview">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M5.6 5.6a9 9 0 0 0 0 12.8M18.4 5.6a9 9 0 0 1 0 12.8M2.8 2.8a13 13 0 0 0 0 18.4M21.2 2.8a13 13 0 0 1 0 18.4"/></svg>
              Live
            </button>
            <button id="captureButton" class="primary-button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              Capture
            </button>
          </div>
        </div>

        <div class="device-frame">
          <div class="device-screen" id="deviceScreen">
            <div class="empty-preview">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M10 18h4"/></svg>
              <span>Start Live to mirror and control the device, then Capture</span>
            </div>
          </div>
        </div>
      </main>

      <aside class="export-panel">
        <section class="panel-section">
          <h2>Export</h2>
          <div class="export-actions">
            <button id="copySvgButton" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy SVG
            </button>
            <button id="copyJsonButton" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H7a2 2 0 0 0-2 2v4a2 2 0 0 1-2 2 2 2 0 0 1 2 2v4a2 2 0 0 0 2 2h1"/><path d="M16 3h1a2 2 0 0 1 2 2v4a2 2 0 0 0 2 2 2 2 0 0 0-2 2v4a2 2 0 0 1-2 2h-1"/></svg>
              Copy Layout JSON
            </button>
            <button id="copyPngButton" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
              Copy PNG
            </button>
            <button id="showSvgButton" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h5l2 3h11v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 7V5a2 2 0 0 1 2-2h4l2 3"/></svg>
              Show Files
            </button>
          </div>
        </section>

        <section class="panel-section">
          <h2>Latest</h2>
          <dl class="file-list" id="fileList">
            <div><dt>SVG</dt><dd>-</dd></div>
            <div><dt>JSON</dt><dd>-</dd></div>
            <div><dt>PNG</dt><dd>-</dd></div>
            <div><dt>XML</dt><dd>-</dd></div>
            <div><dt>Figma JSON</dt><dd>-</dd></div>
          </dl>
        </section>

        <section class="panel-section">
          <h2>Activity</h2>
          <ol class="log-list" id="logList"></ol>
        </section>
      </aside>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
