<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        height: 100vh;
        box-sizing: border-box;
        background: var(--figma-color-bg, #fff);
        color: var(--figma-color-text, #1d1d1f);
      }
      p.hint {
        margin: 0;
        font-size: 11px;
        line-height: 1.4;
        opacity: 0.75;
      }
      p.hint code {
        font-size: 10px;
      }
      textarea {
        flex: 1;
        resize: none;
        width: 100%;
        box-sizing: border-box;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 11px;
        line-height: 1.4;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--figma-color-border, #e6e6e6);
        background: var(--figma-color-bg-secondary, #f5f5f5);
        color: inherit;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        flex: 1;
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary {
        background: #0d99ff;
        color: #fff;
      }
      button.secondary {
        background: var(--figma-color-bg-secondary, #ececec);
        color: inherit;
      }
      label.file {
        font-size: 11px;
        opacity: 0.85;
        cursor: pointer;
        white-space: nowrap;
      }
      input[type="file"] {
        display: none;
      }
      #status {
        font-size: 11px;
        min-height: 14px;
      }
      #status.error {
        color: #e5484d;
      }
      #status.ok {
        color: #30a46c;
      }
    </style>
  </head>
  <body>
    <p class="hint">
      Paste <strong>layout.json</strong> (auto-layout) here, or
      <strong>Load file…</strong> — either <code>layout.json</code> or
      <code>figma-import.json</code> (screenshot + overlay). The file type is
      detected automatically.
    </p>
    <textarea id="json" placeholder="Paste layout.json here…" spellcheck="false"></textarea>
    <div class="row">
      <label class="file" for="file">📂 Load file…</label>
      <input type="file" id="file" accept="application/json,.json" />
    </div>
    <div id="status"></div>
    <div class="row">
      <button class="secondary" id="closeBtn">Close</button>
      <button class="primary" id="buildBtn">Build in Figma</button>
    </div>

    <script>
      const jsonEl = document.getElementById("json");
      const statusEl = document.getElementById("status");

      function setStatus(message, kind) {
        statusEl.textContent = message || "";
        statusEl.className = kind || "";
      }

      // Route a parsed object to the right plugin message.
      function dispatch(parsed) {
        if (parsed && parsed.format === "app-capture-figma-import") {
          const payload = {
            packageName: parsed.packageName,
            capturedAt: parsed.capturedAt,
            dimensions: parsed.dimensions,
            nodes: Array.isArray(parsed.nodes) ? parsed.nodes : []
          };
          const imageBytes = parsed.image ? dataUrlToBytes(parsed.image) : null;
          setStatus("Building screenshot capture…", "");
          parent.postMessage(
            { pluginMessage: { type: "import", payload, image: imageBytes } },
            "*"
          );
          return;
        }
        if (parsed && parsed.root) {
          setStatus("Building auto-layout…", "");
          parent.postMessage(
            { pluginMessage: { type: "build", json: parsed } },
            "*"
          );
          return;
        }
        setStatus('Unrecognised file: expected layout.json ("root") or figma-import.json ("format").', "error");
      }

      document.getElementById("buildBtn").onclick = () => {
        const raw = jsonEl.value.trim();
        if (!raw) {
          setStatus("Paste a layout.json or load a file first.", "error");
          return;
        }
        let parsed;
        try {
          parsed = JSON.parse(raw);
        } catch (e) {
          setStatus("Invalid JSON: " + e.message, "error");
          return;
        }
        dispatch(parsed);
      };

      document.getElementById("closeBtn").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      };

      document.getElementById("file").onchange = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          jsonEl.value = reader.result;
          setStatus(`Loaded ${file.name}`, "ok");
        };
        reader.readAsText(file);
      };

      onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;
        if (msg.type === "done") setStatus(`Done: "${msg.name}". ✓`, "ok");
        if (msg.type === "error") setStatus(msg.message, "error");
      };

      function dataUrlToBytes(dataUrl) {
        const base64 = dataUrl.split(",")[1] || "";
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
      }
    </script>
  </body>
</html>
